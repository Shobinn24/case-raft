[phases.setup]
nixPkgs = ["python311Full", "nodejs_20"]
aptPkgs = ["libpango-1.0-0", "libpangoft2-1.0-0", "libpangocairo-1.0-0", "libgdk-pixbuf-2.0-0", "libglib2.0-0", "libcairo2", "libffi-dev", "shared-mime-info"]

[phases.install]
cmds = [
  "cd frontend && npm install",
  "python3 -m venv /app/venv",
  "/app/venv/bin/pip install --upgrade pip",
  "cd backend && /app/venv/bin/pip install -r requirements.txt"
]

[phases.build]
cmds = ["cd frontend && npm run build"]

[start]
cmd = "cd backend && /app/venv/bin/flask db upgrade && /app/venv/bin/gunicorn run:app --bind 0.0.0.0:$PORT"
